<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据导出工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; font-size: 28px; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; }
        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e9ecef;
        }
        .status-box.loading { background: #fff3cd; border-color: #ffc107; }
        .status-box.success { background: #d4edda; border-color: #c3e6cb; }
        .status-box.error { background: #f8d7da; border-color: #f5c6cb; }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { color: #666; }
        .info-value { font-weight: 600; color: #333; }
        button {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .instructions {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.8;
        }
        .instructions strong { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 数据导出工具</h1>
        <p class="subtitle">一键导出完整备份数据</p>
        
        <div id="status" class="status-box">
            <p>准备就绪，点击按钮导出数据</p>
        </div>
        
        <button id="exportBtn" onclick="exportData()">📤 导出完整数据</button>
        
        <div class="instructions">
            <strong>💡 使用说明：</strong><br>
            1. 点击上方按钮<br>
            2. 浏览器会提示下载文件<br>
            3. 保存文件到桌面<br>
            4. 告诉我文件保存位置
        </div>
    </div>

    <script>
        function exportData() {
            const btn = document.getElementById('exportBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '⏳ 正在导出...';
            status.className = 'status-box loading';
            status.innerHTML = '<p>正在读取本地数据...</p>';
            
            try {
                const KEY = 'talent-showcase-owner-data';
                const data = localStorage.getItem(KEY);
                
                if (!data) {
                    throw new Error('未找到任何数据');
                }
                
                const dataObj = JSON.parse(data);
                const books = dataObj.books || [];
                const workouts = dataObj.workouts || [];
                
                // 检查是否有图片
                const booksWithImages = books.filter(b => b.coverUrl || b.dataUrl).length;
                
                status.innerHTML = \`
                    <p><strong>数据统计：</strong></p>
                    <div class="info-item">
                        <span class="info-label">📚 书籍数量</span>
                        <span class="info-value">\${books.length} 本</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">🖼️ 有图片的书籍</span>
                        <span class="info-value">\${booksWithImages} 本</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">🏋️ 运动记录</span>
                        <span class="info-value">\${workouts.length} 条</span>
                    </div>
                \`;
                
                // 创建下载
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'talent-showcase-backup-' + new Date().toISOString().split('T')[0] + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                status.className = 'status-box success';
                status.innerHTML += '<p style="margin-top: 15px;"><strong>✅ 导出成功！请保存下载的文件</strong></p>';
                btn.textContent = '✅ 已导出';
                
                // 显示文件大小
                const sizeInMB = (new Blob([data]).size / 1024 / 1024).toFixed(2);
                status.innerHTML += \`<p style="margin-top: 10px; color: #666;">文件大小: \${sizeInMB} MB</p>\`;
                
            } catch (error) {
                status.className = 'status-box error';
                status.innerHTML = \`<p><strong>❌ 导出失败</strong></p><p>\${error.message}</p>\`;
                btn.disabled = false;
                btn.textContent = '🔄 重试';
            }
        }
    </script>
</body>
</html>
