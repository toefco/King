
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据恢复</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
        h1 { color: #333; }
        .status { padding: 20px; margin: 20px 0; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0069d9; }
    </style>
</head>
<body>
    <h1>数据恢复</h1>
    <p>点击下方按钮恢复你的数据</p>
    <button id="restoreBtn">恢复数据</button>
    <div id="status"></div>

    <script>
        document.getElementById('restoreBtn').addEventListener('click', async function() {
            const statusDiv = document.getElementById('status');
            try {
                // 加载备份数据
                const response = await fetch('/server/data/userData.json');
                const backupData = await response.json();
                
                // 获取用户数据
                const userKey = Object.keys(backupData)[0];
                const appData = backupData[userKey].data;
                
                // 保存到 localStorage
                const KEY = 'talent-showcase-owner-data';
                localStorage.setItem(KEY, JSON.stringify(appData));
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    <p><strong>✅ 数据恢复成功！</strong></p>
                    <p>已恢复数据：</p>
                    <ul>
                        <li>书籍: ${appData.books?.length || 0} 本</li>
                        <li>运动记录: ${appData.workouts?.length || 0} 条</li>
                        <li>健身测试: ${appData.fitnessTests?.length || 0} 条</li>
                        <li>导出时间: ${appData.exportedAt}</li>
                    </ul>
                    <p><a href="/">点击这里返回首页</a></p>
                `;
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `<p><strong>❌ 恢复失败</strong></p><p>${error.message}</p>`;
                console.error(error);
            }
        });
    </script>
</body>
</html>
