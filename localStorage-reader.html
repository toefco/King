<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>读取 LocalStorage 数据</title>
</head>
<body>
    <h1>LocalStorage 数据查看器</h1>
    <pre id="output" style="white-space: pre-wrap; word-wrap: break-word; background: #f5f5f5; padding: 20px; border-radius: 8px;"></pre>

    <script type="module">
        const OWNER_DATA_KEY = 'talent-showcase-owner-data';

        const raw = localStorage.getItem(OWNER_DATA_KEY);
        if (raw) {
            try {
                const data = JSON.parse(raw);
                document.getElementById('output').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('output').textContent = '解析失败: ' + e.message;
            }
        } else {
            document.getElementById('output').textContent = '没有找到主人模式数据';
        }
    </script>
</body>
</html>
