<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据导出</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h1>📤 只需3步导出数据</h1>
    
    <div style="background: #f0f0f0; padding: 20px; border-radius: 8px; margin: 20px 0;">
        <h3>第1步：按 Ctrl + A 全选下方文本框中的所有内容</h3>
        <textarea id="data" style="width: 100%; height: 150px; font-size: 14px;" readonly></textarea>
        
        <h3 style="margin-top: 20px;">第2步：按 Ctrl + C 复制内容</h3>
        
        <h3 style="margin-top: 20px;">第3步：把复制的文本<strong style="color: red;">粘贴发给我</strong></h3>
    </div>
    
    <div id="status" style="padding: 15px; border-radius: 8px; margin: 20px 0;"></div>
    
    <div style="background: #fff3cd; padding: 15px; border-radius: 8px; margin: 20px 0;">
        <strong>提示：</strong>如果文本框显示"<span style="color: red;">未找到数据</span>"，说明数据还没加载。请先访问应用页面：<br>
        <a href="http://localhost:5185/" target="_blank">http://localhost:5185/</a>
    </div>

    <script>
        const KEY = 'talent-showcase-owner-data';
        const dataArea = document.getElementById('data');
        const status = document.getElementById('status');
        
        const raw = localStorage.getItem(KEY);
        
        if (raw) {
            dataArea.value = raw;
            dataArea.style.height = '300px';
            status.style.background = '#e8f5e9';
            status.style.color = '#2e7d32';
            status.innerHTML = '✅ 找到数据！共 ' + (JSON.parse(raw).books?.length || 0) + ' 本书籍，请复制上方内容发给我';
        } else {
            dataArea.value = '未找到数据，请先访问应用页面';
            dataArea.style.color = 'red';
            status.style.background = '#ffebee';
            status.style.color = '#c62828';
            status.innerHTML = '❌ 未找到数据';
        }
    </script>
</body>
</html>
