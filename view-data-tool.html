<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据查看工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 20px; text-align: center; }
        .info-box {
            background: #e8f5e9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #4caf50;
        }
        .info-item {
            display: inline-block;
            margin-right: 30px;
            font-size: 18px;
        }
        .info-label { color: #666; }
        .info-value { font-weight: 700; color: #2e7d32; margin-left: 8px; }
        textarea {
            width: 100%;
            height: 400px;
            font-family: monospace;
            font-size: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            resize: vertical;
            margin-bottom: 20px;
        }
        textarea:focus { border-color: #667eea; outline: none; }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .instructions {
            background: #fff3cd;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            color: #856404;
        }
        .error {
            background: #ffebee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #f44336;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 数据查看工具</h1>
        
        <div id="infoBox" class="info-box" style="display: none;">
            <h3 style="margin-bottom: 10px;">✅ 找到数据！</h3>
            <span class="info-item">
                <span class="info-label">📚 书籍:</span>
                <span class="info-value" id="bookCount">0</span> 本
            </span>
            <span class="info-item">
                <span class="info-label">🏋️ 运动:</span>
                <span class="info-value" id="workoutCount">0</span> 条
            </span>
            <span class="info-item">
                <span class="info-label">🖼️ 有图片:</span>
                <span class="info-value" id="imageCount">0</span> 本
            </span>
        </div>
        
        <div id="errorBox" class="error" style="display: none;">
            <h3>❌ 未找到数据</h3>
            <p style="margin-top: 10px;">请确保你访问过应用并添加过数据</p>
        </div>
        
        <h3 style="margin-bottom: 10px;">📋 数据内容（可直接复制）:</h3>
        <textarea id="dataArea" placeholder="点击下方按钮加载数据..." readonly></textarea>
        
        <div>
            <button class="btn" onclick="loadData()">🔄 加载数据</button>
            <button class="btn" onclick="copyData()">📋 复制数据</button>
            <button class="btn" onclick="downloadData()">💾 下载JSON文件</button>
        </div>
        
        <div class="instructions">
            <strong>💡 使用说明：</strong><br>
            1. 点击"加载数据"按钮<br>
            2. 等待数据加载完成<br>
            3. 点击"复制数据"或"下载JSON文件"保存数据<br>
            4. 把复制的文本或下载的文件发给我
        </div>
    </div>

    <script>
        const KEY = 'talent-showcase-owner-data';
        const dataArea = document.getElementById('dataArea');
        const infoBox = document.getElementById('infoBox');
        const errorBox = document.getElementById('errorBox');
        
        function loadData() {
            const rawData = localStorage.getItem(KEY);
            
            if (!rawData) {
                errorBox.style.display = 'block';
                infoBox.style.display = 'none';
                dataArea.value = '';
                alert('❌ 未找到数据！请确保你已经访问过应用并添加过数据。');
                return;
            }
            
            try {
                const data = JSON.parse(rawData);
                const books = data.books || [];
                const workouts = data.workouts || [];
                const booksWithImages = books.filter(b => b.coverUrl || b.dataUrl).length;
                
                // 显示统计信息
                document.getElementById('bookCount').textContent = books.length;
                document.getElementById('workoutCount').textContent = workouts.length;
                document.getElementById('imageCount').textContent = booksWithImages;
                
                infoBox.style.display = 'block';
                errorBox.style.display = 'none';
                
                // 显示数据
                dataArea.value = rawData;
                
                alert('✅ 数据加载成功！共 ' + books.length + ' 本书籍，' + booksWithImages + ' 本有图片');
                
            } catch (error) {
                errorBox.style.display = 'block';
                infoBox.style.display = 'none';
                alert('❌ 数据格式错误: ' + error.message);
            }
        }
        
        function copyData() {
            if (!dataArea.value) {
                alert('❌ 请先加载数据');
                return;
            }
            
            dataArea.select();
            document.execCommand('copy');
            alert('✅ 数据已复制到剪贴板！请粘贴到文件或发给我');
        }
        
        function downloadData() {
            if (!dataArea.value) {
                alert('❌ 请先加载数据');
                return;
            }
            
            const blob = new Blob([dataArea.value], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'talent-showcase-backup-' + new Date().toISOString().split('T')[0] + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('✅ 文件已下载！');
        }
        
        // 页面加载时自动加载数据
        window.onload = loadData;
    </script>
</body>
</html>
