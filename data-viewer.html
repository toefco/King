<html>
<head>
    <meta charset="UTF-8">
    <title>数据查看器</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h1>📊 数据查看器</h1>
    <p id="status">正在检查数据...</p>
    <div id="stats" style="margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 8px;"></div>
    <textarea id="output" style="width: 100%; height: 300px; font-size: 12px;" readonly></textarea>
    <button onclick="copy()" style="padding: 10px 20px; font-size: 16px; margin-top: 10px;">复制数据</button>
    
    <script>
        const KEY = 'talent-showcase-owner-data';
        const status = document.getElementById('status');
        const stats = document.getElementById('stats');
        const output = document.getElementById('output');
        
        // 读取数据
        const raw = localStorage.getItem(KEY);
        
        if (!raw) {
            status.innerHTML = '<span style="color: red;">❌ 未找到数据</span>';
        } else {
            try {
                const data = JSON.parse(raw);
                const books = data.books || [];
                const workouts = data.workouts || [];
                const images = books.filter(b => b.coverUrl || b.dataUrl).length;
                
                status.innerHTML = '<span style="color: green;">✅ 找到数据！</span>';
                stats.innerHTML = `
                    <strong>统计：</strong><br>
                    📚 书籍: ${books.length} 本<br>
                    🏋️ 运动: ${workouts.length} 条<br>
                    🖼️ 有图片: ${images} 本<br>
                    📦 大小: ${(new Blob([raw]).size / 1024 / 1024).toFixed(2)} MB
                `;
                
                output.value = raw;
                
                window.dataToCopy = raw;
                
            } catch (e) {
                status.innerHTML = '<span style="color: red;">❌ 数据格式错误: ' + e.message + '</span>';
            }
        }
        
        function copy() {
            if (window.dataToCopy) {
                output.select();
                document.execCommand('copy');
                alert('✅ 已复制到剪贴板！');
            } else {
                alert('❌ 没有数据可复制');
            }
        }
    </script>
</body>
</html>
