<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据恢复工具</title>
</head>
<body>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
        <h1>数据恢复工具</h1>
        <p id="status">正在准备恢复...</p>
        <button id="btn" onclick="restore()" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">
            恢复数据
        </button>
        <p id="result" style="margin-top: 20px;"></p>
    </div>

    <script>
        const KEY = 'talent-showcase-owner-data';
        
        // 数据将从此处加载
        let backupData = null;
        
        // 获取URL参数中的数据
        function getDataFromURL() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            if (data) {
                try {
                    return JSON.parse(decodeURIComponent(atob(data)));
                } catch (e) {
                    return null;
                }
            }
            return null;
        }
        
        // 恢复函数
        async function restore() {
            const btn = document.getElementById('btn');
            const result = document.getElementById('result');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '正在恢复...';
            status.textContent = '正在从本地数据恢复...';
            
            try {
                // 方案1: 从URL参数获取数据
                let data = getDataFromURL();
                
                // 方案2: 如果URL没有，尝试从API获取
                if (!data) {
                    status.textContent = '正在从服务器获取数据...';
                    const response = await fetch('http://localhost:3002/api/data/user_mp3sb595owl3pyqqx9o');
                    const result = await response.json();
                    if (result.success) {
                        data = result.data;
                    }
                }
                
                // 方案3: 尝试从父窗口获取
                if (!data && window.parent && window.parent !== window) {
                    try {
                        data = window.parent.localStorage.getItem('talent-showcase-owner-data');
                        if (data) data = JSON.parse(data);
                    } catch (e) {}
                }
                
                if (data) {
                    localStorage.setItem(KEY, JSON.stringify(data));
                    result.innerHTML = `<span style="color: green;">✅ 恢复成功！</span><br><br>
                        已恢复：<br>
                        📚 ${data.books?.length || 0} 本书籍<br>
                        🏋️ ${data.workouts?.length || 0} 条运动记录<br><br>
                        <a href="http://localhost:5185/" target="_blank">点击这里访问应用</a>`;
                    status.textContent = '✅ 完成';
                    btn.textContent = '已恢复';
                } else {
                    throw new Error('无法获取数据，请尝试其他方法');
                }
            } catch (error) {
                result.innerHTML = `<span style="color: red;">❌ 失败: ${error.message}</span>`;
                status.textContent = '❌ 失败';
                btn.disabled = false;
                btn.textContent = '重试';
            }
        }
        
        // 页面加载时自动尝试恢复
        window.onload = function() {
            setTimeout(restore, 500);
        };
    </script>
</body>
</html>
