<html>
<head>
    <meta charset="UTF-8">
    <title>导出数据</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h1>📤 数据导出工具</h1>
    <p id="msg">点击按钮导出数据</p>
    <button onclick="doExport()" style="padding: 15px 30px; font-size: 18px; cursor: pointer;">
        导出完整数据
    </button>
    <div id="info" style="margin-top: 20px;"></div>
    
    <script>
        function doExport() {
            const msg = document.getElementById('msg');
            const info = document.getElementById('info');
            
            msg.textContent = '正在读取数据...';
            
            const raw = localStorage.getItem('talent-showcase-owner-data');
            
            if (!raw) {
                msg.innerHTML = '<span style="color: red;">❌ 未找到数据！请先访问应用添加数据</span>';
                return;
            }
            
            try {
                const data = JSON.parse(raw);
                msg.innerHTML = '<span style="color: green;">✅ 找到数据！正在下载...</span>';
                
                const books = data.books || [];
                const workouts = data.workouts || [];
                const images = books.filter(b => b.coverUrl || b.dataUrl).length;
                
                info.innerHTML = `
                    <div style="background: #e8f5e9; padding: 15px; border-radius: 8px;">
                        <p>📚 书籍: <strong>${books.length}</strong> 本</p>
                        <p>🏋️ 运动: <strong>${workouts.length}</strong> 条</p>
                        <p>🖼️ 有图片: <strong>${images}</strong> 本</p>
                        <p>📦 大小: <strong>${(new Blob([raw]).size / 1024 / 1024).toFixed(2)}</strong> MB</p>
                    </div>
                `;
                
                // 自动下载
                const blob = new Blob([raw], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'talent-backup-' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
                URL.revokeObjectURL(url);
                
            } catch (e) {
                msg.innerHTML = '<span style="color: red;">❌ 错误: ' + e.message + '</span>';
            }
        }
        
        // 页面加载时自动执行
        doExport();
    </script>
</body>
</html>
