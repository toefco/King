<html lang="zh-CN">
<head>

    <title>导出数据</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            max-width: 800px;

            background: #0a0a14;
            color: #e0e0e0;
        }
        h1 { color: #8b90b8; }

    <button onclick="copyToClipboard()">2️⃣ 复制到剪贴板</button>
